<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS CONNECT | AISAT</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0b2c5e, #4b1d3f, #8b0000);
        background-size: 200% 200%;
        animation: gradientMove 15s ease infinite;
        color: white;
        overflow-x: hidden;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 90%;
        max-width: 1200px;
        margin: auto;
      }

      /* HERO */
      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 120px 0;
      }

      .hero-left {
        flex: 1;
      }

      .hero-left h1 {
        font-family: "Playfair Display", serif;
        font-size: 56px;
        margin-top: 20px;
      }

      .hero-left p {
        margin-top: 15px;
        opacity: 0.8;
      }

      .menu-panel {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 25px;
      }

      .menu-btn {
        display: block;
        padding: 14px;
        margin: 15px 0;
        text-align: center;
        font-family: "Playfair Display", serif;
        letter-spacing: 1px;
        background: linear-gradient(to right, #0b2c5e, #8b0000);
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
      }

      .menu-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }

      /* HOD SECTION */
      .hod-section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 120px 0;
      }

      .hod-text {
        flex: 1;
      }

      .hod-name {
        font-size: 42px;
        font-weight: 700;
        color: #bfe9f4;
      }

      .hod-title {
        font-family: "Playfair Display", serif;
        font-size: 36px;
        margin-top: 15px;
      }

      .hod-image {
        flex: 1;
        background: #e8e4df;
        padding: 30px;
        border-radius: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        transition: 0.4s;
      }

      .hod-image img {
        width: 100%;
        border-radius: 15px;
      }

      .hod-image:hover {
        transform: scale(1.05);
      }

      /* EVENTS */
      .events-section {
        padding: 100px 0;
      }

      .events-title {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        margin-bottom: 40px;
      }

      .carousel-container {
        position: relative;
      }

      .carousel {
        display: flex;
        gap: 30px;
        overflow-x: auto;
        scroll-behavior: smooth;
      }

      .carousel::-webkit-scrollbar {
        display: none;
      }

      .event-card {
        min-width: 280px;
        background: #e8e4df;
        color: #111;
        padding: 40px;
        border-radius: 20px;
        flex-shrink: 0;
        transition: 0.4s;
      }

      .event-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .arrow-btn {
        position: absolute;
        top: 40%;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: #e63946;
        color: white;
        border: none;
        font-size: 22px;
        cursor: pointer;
        transition: 0.3s;
      }

      .arrow-btn:hover {
        transform: scale(1.1);
      }

      .prev {
        left: -25px;
      }
      .next {
        right: -25px;
      }

      /* EXPLORE BUTTON */
      .explore-section {
        padding: 100px 0;
        text-align: center;
      }

      .explore-btn {
        padding: 16px 45px;
        border-radius: 50px;
        background: #e8e4df;
        color: #111;
        font-weight: 600;
        letter-spacing: 1px;
        text-decoration: none;
        transition: 0.3s;
      }

      .explore-btn:hover {
        background: white;
        transform: scale(1.05);
      }

      /* Reveal Animation */
      .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: all 0.8s ease;
      }

      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      footer {
        text-align: center;
        padding: 50px 0;
        font-size: 13px;
        opacity: 0.6;
      }

      @media (max-width: 900px) {
        .hero,
        .hod-section {
          flex-direction: column;
          gap: 50px;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="container hero reveal">
      <div class="hero-left">
        <img src="logo.png" width="120" />
        <h1>CS CONNECT</h1>
        <p>Department of Computer Science & Engineering</p>
      </div>

      <div class="menu-panel">
        <a href="#" class="menu-btn">HOME</a>
        <a href="#" class="menu-btn">ABOUT</a>
        <a href="#" class="menu-btn">FACULTY</a>
        <a href="#" class="menu-btn">ACADEMICS</a>
        <a href="#" class="menu-btn">PLACEMENTS</a>
        <a href="#" class="menu-btn">LIBRARY</a>
        <a href="#" class="menu-btn">CONTACT</a>
      </div>
    </div>

    <div class="container hod-section reveal">
      <div class="hod-text">
        <div class="hod-name">Dr. Jeswin Roy Decouth</div>
        <div class="hod-title">HOD & Associate Professor</div>
      </div>

      <div class="hod-image">
        <img src="hod.jpg" alt="HOD" />
      </div>
    </div>

    <div class="container events-section reveal">
      <div class="events-title">LATEST EVENTS</div>

      <div class="carousel-container">
        <button class="arrow-btn prev" onclick="scrollCarousel(-1)">‹</button>
        <button class="arrow-btn next" onclick="scrollCarousel(1)">›</button>

        <div class="carousel" id="carousel">
          <div class="event-card">
            <h3>Event</h3>
            <p>Date</p>
          </div>
          <div class="event-card">
            <h3>Event</h3>
            <p>Date</p>
          </div>
          <div class="event-card">
            <h3>Event</h3>
            <p>Date</p>
          </div>
          <div class="event-card">
            <h3>Event</h3>
            <p>Date</p>
          </div>
        </div>
      </div>
    </div>

    <div class="container explore-section reveal">
      <a href="#" class="explore-btn">EXPLORE DEPARTMENT</a>
    </div>

    <footer>© 2026 CS CONNECT | AISAT CSE</footer>

    <script>
      function scrollCarousel(direction) {
        const carousel = document.getElementById("carousel");
        const scrollAmount = 320;
        carousel.scrollLeft += direction * scrollAmount;
      }

      const reveals = document.querySelectorAll(".reveal");
      window.addEventListener("scroll", () => {
        reveals.forEach((el) => {
          const top = el.getBoundingClientRect().top;
          if (top < window.innerHeight - 100) {
            el.classList.add("active");
          }
        });
      });
    </script>
  </body>
</html>
