<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - CS Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/recovery.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}" /> <!-- Reusing role selector styles -->
</head>
<body>

  <div class="recovery-split">
    
    <!-- LEFT PANEL -->
    <div class="recovery-left">
      <div class="recovery-left-content">
        <h1 style="font-family: 'Playfair Display'; font-size: 56px; color: #fff; margin: 0;">Account <span style="color: #8B1D1D;">Recovery</span></h1>
        <p style="color: #A0A0A0; font-size: 18px; margin-top: 16px; line-height: 1.5;">Enter your institutional email and role to receive a secure reset link.</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="recovery-right">
      <div class="recovery-card">
        <h2 style="font-family: 'Playfair Display'; font-size: 32px; color: #F5E6BE; margin: 0 0 8px;">Forgot Password?</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 32px;">We'll help you get back to your dashboard.</p>

        <form method="POST" action="{{ url_for('forgot_password') }}">
          
          <div class="form-group" style="margin-bottom: 32px;">
            <label>Select Your Role</label>
            <div class="role-tabs">
              <button type="button" class="role-btn active" onclick="setRole('student', this)">Student</button>
              <button type="button" class="role-btn" onclick="setRole('faculty', this)">Faculty</button>
              <button type="button" class="role-btn" onclick="setRole('admin', this)">Admin</button>
            </div>
            <input type="hidden" name="role" id="roleInput" value="student">
          </div>

          <div class="form-group">
            <label>Institutional Email</label>
            <input type="email" name="email" class="form-control" placeholder="example@aisat.ac.in" required>
          </div>

          <button type="submit" class="btn-primary">Send Reset Link</button>

          <div style="text-align: center; margin-top: 24px;">
            <a href="/login" style="color: #8B1D1D; text-decoration: none; font-size: 14px; font-weight: 600;">&larr; Back to Login</a>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    function setRole(role, btn) {
      document.getElementById('roleInput').value = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
