<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - CS Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/recovery.css') }}" />
</head>
<body>

  <div class="recovery-split">
    
    <!-- LEFT PANEL -->
    <div class="recovery-left">
      <div class="recovery-left-content">
        <h1 style="font-family: 'Playfair Display'; font-size: 56px; color: #fff; margin: 0;">Secure <span style="color: #8B1D1D;">Reset</span></h1>
        <p style="color: #A0A0A0; font-size: 18px; margin-top: 16px; line-height: 1.5;">Establish a strong new password to protect your academic profile.</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="recovery-right">
      <div class="recovery-card">
        <h2 style="font-family: 'Playfair Display'; font-size: 32px; color: #F5E6BE; margin: 0 0 8px;">Reset Password</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 24px;">Set your new credentials below.</p>

        <!-- Email Context Display -->
        <div class="email-display">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          <span id="resetEmail">arjun@aisat.ac.in</span>
        </div>

        <form method="POST" action="{{ url_for('reset_password') }}">
          <input type="hidden" name="token" value="{{ token }}">
          
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPass" class="form-control" placeholder="••••••••" required oninput="validatePassword(this.value)">
            
            <div class="strength-meter">
              <div id="strengthBar" class="strength-bar"></div>
            </div>

            <ul class="requirement-list">
              <li class="req-item" id="req-len">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                8+ Characters
              </li>
              <li class="req-item" id="req-up">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Uppercase Letter
              </li>
              <li class="req-item" id="req-num">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                One Number
              </li>
              <li class="req-item" id="req-spec">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Special Char
              </li>
            </ul>
          </div>

          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-primary">Update Password</button>

        </form>
      </div>
    </div>

  </div>

  <script>
    function validatePassword(val) {
      const requirements = {
        len: val.length >= 8,
        up: /[A-Z]/.test(val),
        num: /[0-9]/.test(val),
        spec: /[^A-Za-z0-9]/.test(val)
      };

      let score = 0;
      Object.keys(requirements).forEach(req => {
        const el = document.getElementById('req-' + req);
        if (requirements[req]) {
          el.classList.add('valid');
          score += 25;
        } else {
          el.classList.remove('valid');
        }
      });

      const bar = document.getElementById('strengthBar');
      bar.style.width = score + '%';
      
      // Match "Strong Tier Green" Requirement
      if (score === 100) bar.style.background = '#50C878';
      else if (score >= 50) bar.style.background = '#FFD700';
      else bar.style.background = '#8B1D1D';
    }
  </script>

</body>
</html>
